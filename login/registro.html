<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="stylesheet" href="registro.css">
    <link rel="icon" href="/Imagenes/buhos.ico">
</head>

<body>

    <div class="login">

        <img src="imagenes-login/inactivo/1.png" id="monster" alt="">

        <form class="formulario" action="registro.php" method="POST">

            <label>Nombre completo</label>
            <input 
                type="text"
                id="input-nombre"
                name="nombre"
                placeholder="Laura Cardona"
                autocomplete="off"
            >

            <label>Usuario</label>
            <input 
                type="text"
                id="input-usuario"
                name="usuario"
                placeholder="usuario.mimvy@gmail.com"
                autocomplete="off"
            >

            <label>Numero de telefono</label>
            <input 
                type="text"
                id="input-telefono"
                name="telefono"
                placeholder="+57 300 1234567"
                autocomplete="off"
            >

            <label>Contraseña</label>
            <div class="campo-clave">
                <input 
                    type="password"
                    id="input-clave"
                    name="contrasena"
                    placeholder="*******"
                >
                <button type="button" class="btn-ojo" id="btn-ojo-clave" aria-label="Mostrar contraseña">
                    👁️
                </button>
            </div>

            <label>Confirmar contraseña</label>
            <div class="campo-clave">
                <input 
                    type="password"
                    id="input-confirmar-clave"
                    name="confirmar_contrasena"
                    placeholder="*******"
                >
                <button type="button" class="btn-ojo" id="btn-ojo-confirmar" aria-label="Mostrar contraseña">
                    👁️
                </button>
            </div>

            <button type="submit">Registrarse</button>

            <a href="login.html">
                Ya tengo cuenta
            </a>

        </form>

    </div>

    <script src="login.js"></script>

</body>
</html>
