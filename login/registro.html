<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login">

        <img src="imagenes-login/inactivo/1.png" id="monster" alt="">

        <form class="formulario" action="registro.php" method="POST">

            <label>Usuario</label>

            <input 
                type="text"
                id="input-usuario"
                name="usuario"
                placeholder="usuario.mimvy@gmail.com"
                autocomplete="off"
            >

            <label>Contraseña</label>

            <input 
                type="password"
                id="input-clave"
                name="contrasena"
                placeholder="*******"
            >

            <button type="submit">Registrarse</button>

            <a href="login.html">
                Ya tengo cuenta
            </a>

        </form>

    </div>

    <script src="login.js"></script>

</body>
</html>
