<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="/Imagenes/buhos.ico">
</head>

<body>

    <div class="login">

        <img src="imagenes-login/inactivo/1.png" id="monster" alt="">

        <form class="formulario" action="login.php" method="POST">

            <label>Usuario</label>

            <input 
                type="text"
                id="input-usuario"
                name="usuario"
                placeholder="usuario.mimvy@gmail.com"
                autocomplete="off"
                required
            >

            <label>Contraseña</label>

            <div class="campo-clave">
                <input 
                    type="password"
                    id="input-clave"
                    name="contrasena"
                    placeholder="*******"
                    required
                >
                <button type="button" class="btn-ojo" id="btn-ojo-clave" aria-label="Mostrar contraseña">
                    👁️
                </button>
            </div>

            <button type="submit">Login</button>

            <a href="registro.html">
                ¿No tienes cuenta? Regístrate
            </a>

        </form>

    </div>

    <script src="login.js"></script>

</body>
</html>
